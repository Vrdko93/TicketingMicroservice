<html>
<head>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
	$(document).ready(function() {
		$("#save").click(function () {
			$.ajax({
				url: "/employees",
				type: "POST",
				contentType: "application/json",
				data: JSON.stringify({
					"name": $("#name").val(),
					"email": $("#email").val(),
					"password": $("#password").val(),
					"department": $("#department").val(),
					"project": $("#project").val(),
					"managerId": $("#managerId").val()
				}),
				success: function (response) {
					
					// Clear text inputs
					$("#name").val("");
					$("#email").val("");
					$("#password").val("");
					$("#department").val("");
					$("#project").val("");
					$("#managerId").val("");
					
					console.log("success");
				},
				error: function (xhr, status, error) {
					console.log("error");
				}
			});
		});
		$("#get").click(function () {
			$.ajax({
				url: "/employees",
				type: "GET",
		
				success: function (response) {
					
					// 🔥 Clear old rows first
					$("table tr:not(:first)").remove();
					
					$.each(response, function(key, value) {
						var row = '<tr><td>'+value.id+'</td><td>'+value.name+'</td><td>'+value.email+'</td><td>'+value.password+'</td><td>'+						(value.roles && value.roles.length > 0
						        ? value.roles.map(r => r.name).join(", ")
						        : "")+'</td><td>'+value.department+'</td><td>'+value.project+'</td><td>'+value.managerId+'</td></tr>';
						$("table").append(row);
					});
	
				},
				error: function (xhr, status, error) {
					console.log("error");
				}
			});
		});			
	});
</script>
</head>
<body>
<h1>Employees Page</h1>
Name: <input type="text" id="name"></br></br>
Email: <input type="text" id="email"></br></br>
Password: <input type="password" id="password"></br></br>
Department: <input type="text" id="department"></br></br>
Project: <input type="text" id="project"></br></br>
Manager ID: <input type="text" id="managerId"></br></br>

<input type="button" value="Save" id="save">
<input type="button" value="Get" id="get"></br></br>
<table border="1">
	<tr><th>ID</th><th>Name</th><th>Email</th><th>Password</th><th>Role</th><th>Department</th><th>Project</th><th>Manager ID</th></tr>	
</table>
</body>
</html>
