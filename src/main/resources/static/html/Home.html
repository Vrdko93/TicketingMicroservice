<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ticketing Gateway System</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgb(83, 107, 172);
      font-family: Arial, sans-serif;
      position: relative;
    }

    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      background-color: #d9534f;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      transition: background-color 0.2s ease;
    }

    .logout-btn:hover {
      background-color: #c9302c;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    h1 {
      margin-bottom: 20px;
      color: rgb(255, 255, 255);
    }

    .card {
      width: 320px;
      height: 80px;
      background-color: white;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
    }
  </style>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

  <button class="logout-btn" onclick="logout()">Log Out</button>

  <div class="container">
    <h1>Ticketing Gateway System</h1>

    <div class="card" onclick="window.location.href='http://localhost:8080/html/ticket.html'">
      Tickets Page
    </div>

    <div class="card" id="employeeButton">
      Employees Page
    </div>

    <div class="card" onclick="window.location.href='http://localhost:8080/html/tickethistory.html'">
      Ticket History Page
    </div>
  </div>

  <script>
      async function logout() {
    	try {
	        const response = await fetch('http://localhost:8080/logout', {
	          method: 'POST',
	          credentials: 'include'
	        });

	        if (response.ok) {
				
	        	window.location.href = 'http://localhost:8080/login';
	        } else {
				
	            alert('Logout failed.');
	        }
      	} catch (error) {
		
	        console.error('Error during logout:', error);
	        alert('An error occurred during logout.');
      }
    }
	
	$(document).ready(function() {
	
		$("#employeeButton").click(function() {
	
		    $.get("/current-roles", function(roles) {
	
				if(roles.includes("ROLE_ADMIN") || roles.includes("ROLE_MANAGER")) {
	
				     window.location.href = "/html/employee.html";
				}
				else {
	
				     alert("You're not authorized to access this page.");
				    }
				});
			});
	});
	
  </script>

</body>
</html>
