<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tickets Page</title>

<style>
    body {
        margin: 0;
        padding: 40px;
        background-color: rgb(83, 107, 172);
        font-family: Arial, sans-serif;
        color: #333;
    }

    .ticket-form {
        max-width: 1100px;
        margin: auto;
        background-color: white;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        margin-bottom: 30px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    input[type="text"],
    select {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        margin-bottom: 18px;
        border: 1px solid #ccc;
        border-radius: 12px;
        box-sizing: border-box;
        font-size: 15px;
    }

    button,
    input[type="button"] {
        cursor: pointer;
        padding: 12px 20px;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: bold;
        margin-right: 10px;
        margin-top: 10px;
        transition: opacity 0.2s ease, transform 0.2s ease;
    }

    button:hover,
    input[type="button"]:hover {
        opacity: 0.9;
        transform: scale(1.03);
    }

    #get {
        background-color: #28a745;
        color: white;
    }

    #save {
        background-color: orangered;
        color: white;
    }

    #update {
        background-color: #007bff;
        color: white;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background-color: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    th {
        background-color: #333;
        color: white;
        padding: 14px;
        text-align: left;
    }

    td {
		padding: 12px;
		border-bottom: 1px solid #ddd;
		
    }

    tr:hover td {
        background-color: #f1f1f1;
    }

	.actions-cell {
	    white-space: nowrap;
	}

	.action-btn {
		padding: 4px 8px;
		font-size: 10px;
		border-radius: 6px;
		border: none;
		cursor: pointer;
		margin: 2px;
	}
</style>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script>
    $(document).ready(function() {

        $.get("/employees", function(data) {

            $.each(data, function(i, emp) {

                $("#createdBy").append(
                    `<option value="${emp.id}">
                        ${emp.name}
                    </option>`
                );

                $("#assignee").append(
                    `<option value="${emp.id}">
                        ${emp.name}
                    </option>`
                );
            });

        });

        $("#save").click(function () {

            $.ajax({
                url: "/tickets",
                type: "POST",
                contentType: "application/json",

                data: JSON.stringify({
                    "title": $("#title").val(),
                    "description": $("#description").val(),
                    "createdById": $("#createdBy").val() || null,
                    "assigneeId": $("#assignee").val() || null,
                    "priority": $("#priority").val(),
                    "status": $("#status").val(),
                    "category": $("#category").val(),
                    "fileAttachmentPath": $("#fileAttachmentPath").val()
                }),

                success: function (response) {

                    $("#title").val("");
                    $("#description").val("");
                    $("#category").val("");
                    $("#fileAttachmentPath").val("");
                    $("#createdBy").val("");
                    $("#assignee").val("");

                    $("#priority").prop("selectedIndex", 0);
                    $("#status").prop("selectedIndex", 0);

                    alert("Ticket created");

                    $("#get").click();
					
					window.scrollTo({
					    top: document.body.scrollHeight,
					    behavior: "smooth"
					});
                },

                error: function () {
                    console.log("error");
                }
            });
        });

        $("#get").click(function () {

            $.ajax({
                url: "/tickets",
                type: "GET",

                success: function (response) {

                    $("table tr:not(:first)").remove();

                    $.each(response, function(key, value) {

                        var row =
                            '<tr>' +
                                '<td>' + value.id + '</td>' +
                                '<td>' + value.title + '</td>' +
                                '<td>' + value.description + '</td>' +
                                '<td>' + value.priority + '</td>' +
                                '<td>' + value.status.replaceAll("_", " ") + '</td>' +
                                '<td>' + value.creationDate + '</td>' +
                                '<td>' + value.category + '</td>' +
                                '<td>' + value.fileAttachmentPath + '</td>' +
                                '<td>' + (value.createdBy ? value.createdBy.name : '') + '</td>' +
                                '<td>' + (value.assignee ? value.assignee.name : '') + '</td>' +
								'<td class="actions-cell">' +
								    '<button style="background-color: orange;" class="action-btn" onclick="editTicket(' + value.id + ')">Edit</button>' +
								    '<button style="background-color: red; color: white;" class="action-btn" onclick="deleteTicket(' + value.id + ')">Delete</button>' +
								    '<button style="background-color: lightgreen;" class="action-btn" onclick="downloadTicket(' + value.id + ')">Download</button>' +
								    '<button style="background-color: cyan;" class="action-btn" onclick="sendTicketEmail(' + value.id + ')">Send Email</button>' +
								'</td>' +
                            '</tr>';

                        $("table").append(row);
                    });
					
					// scroll to top of table after loading data
					$("table")[0].scrollIntoView({
					    behavior: "smooth",
					    block: "start"
					});
                },

                error: function () {
                    console.log("error");
                }
            });
        });

        $("#update").click(function () {

            var id = $("#ticketId").val();

            $.ajax({

                url: "/tickets/" + id,
                type: "PUT",
                contentType: "application/json",

                data: JSON.stringify({

                    "title": $("#title").val(),
                    "description": $("#description").val(),
                    "createdById": $("#createdBy").val(),
                    "assigneeId": $("#assignee").val(),
                    "priority": $("#priority").val(),
                    "status": $("#status").val(),
                    "category": $("#category").val(),
                    "fileAttachmentPath": $("#fileAttachmentPath").val()
                }),

                success: function () {

                    $("#title").val("");
                    $("#description").val("");
                    $("#category").val("");
                    $("#fileAttachmentPath").val("");
                    $("#createdBy").val("");
                    $("#assignee").val("");

                    $("#priority").prop("selectedIndex", 0);
                    $("#status").prop("selectedIndex", 0);

                    alert("Ticket updated");

                    $("#get").click();
                }
            });
        });
    });

    function editTicket(id) {

        $.get("/tickets/" + id, function(ticket) {

            $("#ticketId").val(ticket.id);
            $("#title").val(ticket.title);
            $("#description").val(ticket.description);
            $("#createdBy").val(ticket.createdBy.id);
            $("#assignee").val(ticket.assignee ? ticket.assignee.id : "");
            $("#priority").val(ticket.priority);
            $("#status").val(ticket.status);
            $("#category").val(ticket.category);
            $("#fileAttachmentPath").val(ticket.fileAttachmentPath);
			
			// move page to top
			window.scrollTo({
			    top: 0,
			    behavior: "smooth"
			});
        });
    }

    function deleteTicket(id) {

        $.ajax({
            url: "/tickets/" + id,
            type: "DELETE",

            success: function() {

                alert("Ticket deleted");

                $("#get").click();
            },
			
			 error: function(xhr) {

			        if(xhr.status === 403) {

			            alert("You're not authorized to delete a ticket.");
			        }
			        else {

			            alert("Something went wrong");
			        }
			    }
			});
        }

    function downloadTicket(id) {

        window.location.href = "/tickets/download/" + id;
    }

    function sendTicketEmail(id) {

        $.ajax({
            url: "/tickets/" + id + "/email",
            type: "POST",

            success: function() {
                alert("Email sent successfully!");
            },

            error: function() {
                alert("Error sending email");
            }
        });
    }
</script>
</head>

<body>

<div class="ticket-form">

    <h1>Tickets Page</h1>

    <input type="hidden" id="ticketId">

    Title:
    <input type="text" id="title">

    Description:
    <input type="text" id="description">

    Created By:
    <select id="createdBy">
        <option value="" disabled selected>Select Employee</option>
    </select>

    Assignee:
    <select id="assignee">
        <option value="" disabled selected>Select Employee</option>
    </select>

    Priority:
    <select id="priority">
        <option value="" disabled selected>Select Priority</option>
        <option value="LOW">LOW</option>
        <option value="MEDIUM">MEDIUM</option>
        <option value="HIGH">HIGH</option>
    </select>

    Status:
    <select id="status">
        <option value="" disabled selected>Select Status</option>
        <option value="OPEN">OPEN</option>
        <option value="PENDING_APPROVAL">PENDING APPROVAL</option>
        <option value="APPROVED">APPROVED</option>
        <option value="REJECTED">REJECTED</option>
        <option value="ASSIGNED">ASSIGNED</option>
        <option value="RESOLVED">RESOLVED</option>
        <option value="CLOSED">CLOSED</option>
        <option value="REOPENED">REOPENED</option>
    </select>

    Category:
    <input type="text" id="category">

    File Attachment Path:
    <input type="text" id="fileAttachmentPath">

    <input type="button" value="Get" id="get">
    <input type="button" value="Save" id="save">
    <input type="button" value="Update" id="update">

</div>

<table>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Priority</th>
        <th>Status</th>
        <th>Creation Date</th>
        <th>Category</th>
        <th>File Attachment Path</th>
        <th>Created By</th>
        <th>Assignee</th>
        <th>Actions</th>
    </tr>
</table>

</body>
</html>
