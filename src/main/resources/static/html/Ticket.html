<html>
<head>
	<style>
		button {
		    cursor: pointer;
		}
		input[type="button"] {
		    cursor: pointer;
		}
	</style>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
	$(document).ready(function() {
		$.get("/employees", function(data) {

		    $.each(data, function(i, emp) {

		        $("#createdBy").append(
		            `<option value="${emp.id}">
		                ${emp.name}
		            </option>`
		        );
				$("#assignee").append(
				    `<option value="${emp.id}">
				        ${emp.name}
				    </option>`
				);
		    });

		});
		$("#save").click(function () {
			$.ajax({
				url: "/tickets",
				type: "POST",
				contentType: "application/json",
				data: JSON.stringify({
					"title": $("#title").val(),
					"description": $("#description").val(),
					"createdById": $("#createdBy").val() || null,
			        "assigneeId": $("#assignee").val() || null,
					"priority": $("#priority").val(),
					"status": $("#status").val(),
					"category": $("#category").val(),
					"fileAttachmentPath": $("#fileAttachmentPath").val()
				}),
				success: function (response) {

					    // Clear text inputs
					    $("#title").val("");
					    $("#description").val("");
					    $("#category").val("");
					    $("#fileAttachmentPath").val("");
					    $("#createdBy").val("");
						$("#assignee").val("");

					    // Reset dropdowns
					    $("#priority").prop("selectedIndex", 0);
					    $("#status").prop("selectedIndex", 0);

						alert("Ticket created");
						$("#get").click();
				},
				error: function (xhr, status, error) {
					console.log("error");
				}
			});
		});
		$("#get").click(function () {
			$.ajax({
				url: "/tickets",
				type: "GET",
		
				success: function (response) {

					// 🔥 Clear old rows first
					$("table tr:not(:first)").remove();
					
					$.each(response, function(key, value) {
						var row = '<tr><td>'+value.id+'</td><td>'+value.title+'</td><td>'+value.description+
							'</td><td>'+value.priority+'</td><td>'+value.status+'</td><td>'+value.creationDate+
							'</td><td>'+value.category+'</td><td>'+value.fileAttachmentPath+'</td><td>'+
							(value.createdBy ? value.createdBy.name : '')+'</td><td>'+
							(value.assignee ? value.assignee.name : '')+'</td><td>'+
							'<button style="background-color: orange;" onclick="editTicket('+value.id+')">Edit</button>'+
							'<button style="background-color: red; color: white;" onclick="deleteTicket('+value.id+')">Delete</button>'+
							'<button style="background-color:lightgreen;" onclick="downloadTicket('+value.id+')">Download</button>'+
							'<button style="background-color:cyan;" onclick="sendTicketEmail('+value.id+')">Send Email</button>'
							'</td></tr>';
						
						$("table").append(row);
					});
	
				},
				error: function (xhr, status, error) {
					console.log("error");
				}
			});
		});
		
		$("#update").click(function () {

		    var id = $("#ticketId").val();

		    $.ajax({

		        url: "/tickets/" + id,
		        type: "PUT",
		        contentType: "application/json",

		        data: JSON.stringify({

		            "title": $("#title").val(),
		            "description": $("#description").val(),
					"createdById": $("#createdBy").val(),
					"assigneeId": $("#assignee").val(),
		            "priority": $("#priority").val(),
		            "status": $("#status").val(),
					"category": $("#category").val(),
					"fileAttachmentPath": $("#fileAttachmentPath").val()
		        }),

		        success: function () {
		            
					// Clear text inputs
					$("#title").val("");
					$("#description").val("");
					$("#category").val("");
					$("#fileAttachmentPath").val("");
					$("#createdBy").val("");
					$("#assignee").val("");

					// Reset dropdowns
					$("#priority").prop("selectedIndex", 0);
					$("#status").prop("selectedIndex", 0);
					
					alert("Ticket updated");
		            $("#get").click();
		        }
		    });
		});		
	});
	
	function editTicket(id) {

	    $.get("/tickets/" + id, function(ticket) {

	        $("#ticketId").val(ticket.id);
	        $("#title").val(ticket.title);
	        $("#description").val(ticket.description);
			$("#createdBy").val(ticket.createdBy.id);
			$("#assignee").val(ticket.assignee ? ticket.assignee.id : "");
			$("#priority").val(ticket.priority);
			$("#status").val(ticket.status);
			$("#category").val(ticket.category);
			$("#fileAttachmentPath").val(ticket.fileAttachmentPath);
	    });
	}
	
	function deleteTicket(id) {

	    $.ajax({
	        url: "/tickets/" + id,
	        type: "DELETE",

	        success: function() {

				alert("Ticket deleted");
	            $("#get").click();
	        }
	    });
	}
	
	function downloadTicket(id) {

	    window.location.href = "/tickets/download/" + id;
	}
	
	function sendTicketEmail(id) {

	    $.ajax({
	        url: "/tickets/" + id + "/email",
	        type: "POST",
	        success: function(response) {
	            alert("Email sent successfully!");
	        },
	        error: function() {
	            alert("Error sending email");
	        }
	    });
	}
</script>
</head>
<body>
	<div class="ticket-form">
		<h1>Tickets Page</h1>
		<input type="hidden" id="ticketId">
		Title: <input type="text" id="title"></br></br>
		Description: <input type="text" id="description"></br></br>
		Created By:
		<select id="createdBy">
			<option value="" disabled selected>Select Employee</option>
		</select></br></br>
		Assignee:
		<select id="assignee">
			<option value="" disabled selected>Select Employee</option>
		</select></br></br>
		Priority:
		<select id="priority">
			<option value="" disabled selected>Select Priority</option>
		    <option value="LOW">LOW</option>
		    <option value="MEDIUM">MEDIUM</option>
		    <option value="HIGH">HIGH</option>
		</select><br></br>
		Status:
		<select id="status">
			<option value="" disabled selected>Select Status</option>
		    <option value="OPEN">OPEN</option>
		    <option value="PENDING_APPROVAL">PENDING APPROVAL</option>
		    <option value="APPROVED">APPROVED</option>
		    <option value="REJECTED">REJECTED</option>
		    <option value="ASSIGNED">ASSIGNED</option>
		    <option value="RESOLVED">RESOLVED</option>
		    <option value="CLOSED">CLOSED</option>
		    <option value="REOPENED">REOPENED</option>
		</select><br></br>
		Category: <input type="text" id="category"></br></br>
		File Attachment Path: <input type="text" id="fileAttachmentPath"></br></br>
		
		<input style="background-color: green; color: white;" type="button" value="Get" id="get">
		<input style="background-color: orangered; color: white;" type="button" value="Save" id="save">
		<input style="background-color: blue; color: white;" type="button" value="Update" id="update"></br></br>
	</div>
	<table border="1">
		<tr><th>ID</th><th>Title</th><th>Description</th><th>Priority</th><th>Status</th><th>Creation Date</th><th>Category</th><th>File Attachment Path</th><th>Created By</th><th>Assignee</th></tr>	
	</table>

</body>
</html>
