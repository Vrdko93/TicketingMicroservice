<html>
<head>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
	$(document).ready(function() {
		$("#save").click(function () {
			$.ajax({
				url: "/tickets",
				type: "POST",
				contentType: "application/json",
				data: JSON.stringify({
					"title": $("#title").val(),
					"description": $("#description").val(),
					"priority": $("#priority").val(),
					"status": $("#status").val(),
					"category": $("#category").val(),
					"fileAttachmentPath": $("#fileAttachmentPath").val()
				}),
				success: function (response) {

					    // Clear text inputs
					    $("#title").val("");
					    $("#description").val("");
					    $("#category").val("");
					    $("#fileAttachmentPath").val("");
					    $("#assignee").val("");

					    // Reset dropdowns
					    $("#priority").prop("selectedIndex", 0);
					    $("#status").prop("selectedIndex", 0);

					    console.log("success");
					
					
					console.log("success");
				},
				error: function (xhr, status, error) {
					console.log("error");
				}
			});
		});
		$("#get").click(function () {
			$.ajax({
				url: "/tickets",
				type: "GET",
		
				success: function (response) {
					
					// 🔥 Clear old rows first
					$("table tr:not(:first)").remove();
					
					$.each(response, function(key, value) {
						var row = '<tr><td>'+value.id+'</td><td>'+value.title+'</td><td>'+value.description+'</td><td>'+value.priority+'</td><td>'+value.status+'</td><td>'+value.creationDate+'</td><td>'+value.category+'</td><td>'+value.fileAttachmentPath+'</td><td>'+(value.createdBy ? value.createdBy.name : '')+'</td><td>'+(value.assignee ? value.assignee.name : '')+'</td></tr>';
						$("table").append(row);
					});
	
				},
				error: function (xhr, status, error) {
					console.log("error");
				}
			});
		});			
	});
</script>
</head>
<body>
<h1>Tickets Page</h1>
Title: <input type="text" id="title"></br></br>
Description: <input type="text" id="description"></br></br>
Priority:
<select id="priority">
	<option value="" disabled selected>Select Priority</option>
    <option value="LOW">LOW</option>
    <option value="MEDIUM">MEDIUM</option>
    <option value="HIGH">HIGH</option>
</select><br></br>
Status:
<select id="status">
	<option value="" disabled selected>Select Status</option>
    <option value="OPEN">OPEN</option>
    <option value="PENDING_APPROVAL">PENDING APPROVAL</option>
    <option value="APPROVED">APPROVED</option>
    <option value="REJECTED">REJECTED</option>
    <option value="ASSIGNED">ASSIGNED</option>
    <option value="RESOLVED">RESOLVED</option>
    <option value="CLOSED">CLOSED</option>
    <option value="REOPENED">REOPENED</option>
</select><br></br>
Category: <input type="text" id="category"></br></br>
File Attachment Path: <input type="text" id="fileAttachmentPath"></br></br>


<input type="button" value="Save" id="save">
<input type="button" value="Get" id="get"></br></br>
<table border="1">
	<tr><th>ID</th><th>Title</th><th>Description</th><th>Priority</th><th>Status</th><th>Creation Date</th><th>Category</th><th>File Attachment Path</th><th>Created By</th><th>Assignee</th></tr>	
</table>
</body>
</html>
