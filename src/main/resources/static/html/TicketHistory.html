<html>
<head>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
	$(document).ready(function() {
		$("#get").click(function () {
			$.ajax({
				url: "/history",
				type: "GET",
		
				success: function (response) {
					
					// 🔥 Clear old rows first
					$("table tr:not(:first)").remove();
					
					$.each(response, function(key, value) {
						var row = '<tr><td>'+value.id+'</td><td>'+value.action+'</td><td>'+value.actionDate+'</td><td>'+value.comments+'</td></tr>';
						$("table").append(row);
					});
	
				},
				error: function (xhr, status, error) {
					console.log("error");
				}
			});
		});			
	});
</script>
</head>
<body>
<h1>Ticket History Page</h1>
<input type="button" value="Get" id="get"></br></br>
<table border="1">
	<tr><th>ID</th><th>Action</th><th>ActionDate</th><th>Comments</th></tr>	
</table>
</body>
</html>
